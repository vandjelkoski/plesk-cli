name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  integration-test:
    runs-on: ubuntu-latest
    env:
      LOGIN_NAME: ${{ secrets.PLESK_LOGIN_NAME }}
      PASSWD: ${{ secrets.PLESK_PASSWD }}
      DOMAIN_NAME: ${{ secrets.PLESK_DOMAIN_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Ruby (required for Bashly)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"

      - name: Install Bashly
        run: gem install bashly -v 1.3.6

      - name: Generate CLI
        run: bashly generate && chmod +x plesk-cli

      - name: Login
        run: ./plesk-cli login

      - name: Resolve domain ID
        run: |
          DOMAIN_ID=$(./plesk-cli domain id "$DOMAIN_NAME")
          echo "Domain ID: $DOMAIN_ID"
          echo "DOMAIN_ID=$DOMAIN_ID" >> "$GITHUB_ENV"
          echo "DUMMY_HOST=dummy.$DOMAIN_NAME." >> "$GITHUB_ENV"

      - name: List records (raw output for inspection)
        run: ./plesk-cli records list "$DOMAIN_ID" | jq '.'

      - name: Find dummy record and update IP
        run: |
          RECORDS=$(./plesk-cli records list "$DOMAIN_ID")
          RECORD_ID=$(echo "$RECORDS" | jq -r --arg h "$DUMMY_HOST" 'select(.host==$h) | .id' | head -1)
          CURRENT_IP=$(echo "$RECORDS" | jq -r --arg h "$DUMMY_HOST" 'select(.host==$h) | .value' | head -1)

          if [ "$CURRENT_IP" = "192.0.2.1" ]; then TARGET_IP="192.0.2.2"; else TARGET_IP="192.0.2.1"; fi

          echo "Record ID : $RECORD_ID"
          echo "Current IP: $CURRENT_IP"
          echo "Target IP : $TARGET_IP"
          echo "TARGET_IP=$TARGET_IP" >> "$GITHUB_ENV"

          ./plesk-cli records update "$RECORD_ID" "$DUMMY_HOST" "$TARGET_IP" "$DOMAIN_ID"

      - name: Save records
        run: ./plesk-cli records save "$DOMAIN_ID"

      - name: Verify IP change in records list
        run: |
          UPDATED_IP=$(./plesk-cli records list "$DOMAIN_ID" | jq -r --arg h "$DUMMY_HOST" 'select(.host==$h) | .value' | head -1)
          echo "Updated IP : $UPDATED_IP"
          echo "Expected IP: $TARGET_IP"
          [ "$UPDATED_IP" = "$TARGET_IP" ]
